<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabian Sena Workout Routine</title>
<style>
body {
font-family: 'Arial', sans-serif;
background-color: #0f0f0f;
color: #f5f5f5;
margin: 0;
padding: 20px;
}
h1 {
text-align: center;
font-size: 28px;
margin-bottom: 20px;
color: #ffcc00;
}
#calendar {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
margin-bottom: 25px;
}
.day {
padding: 10px 5px;
background: #1c1c1c;
border-radius: 12px;
cursor: pointer;
text-align: center;
font-weight: bold;
transition: 0.3s;
word-wrap: break-word;
}
.day.active {
background: #ffcc00;
color: black;
}
.day.today {
border: 2px solid #ffcc00;
}
#workout-container {
display: flex;
flex-direction: column;
gap: 12px;
max-width: 100%;
margin: 0 auto;
padding: 0 5px;
}
.exercise {
background: #1a1a1a;
padding: 12px 15px;
border-radius: 10px;
display: flex;
align-items: center;
font-size: 16px;
}
.exercise.completed {
opacity: 0.6;
text-decoration: line-through;
}
.checkbox {
margin-right: 12px;
width: 24px;
height: 24px;
accent-color: #ffcc00;
}
@media screen and (max-width: 600px) {
#calendar {
grid-template-columns: repeat(2, 1fr);
}
}
@media screen and (max-width: 400px) {
h1 {
font-size: 22px;
}
.exercise {
font-size: 14px;
}
}
</style>
</head>
<body>

<h1>Fabian Sena Workout Routine</h1>

<div id="calendar"></div>
<div id="workout-container"></div>

<script>
// 6-day plan
const plan = [
{ day:"Monday", exercises:[
{name:"Incline DB Press", sets:"3x8"}, {name:"Neutral Pull-ups", sets:"3x8"}, {name:"Cable Fly", sets:"3x12"},
{name:"Face Pull", sets:"3x15"}, {name:"Lateral Raise", sets:"3x12"}, {name:"Cable Punch", sets:"3x12"},
{name:"Lateral Raises (2–3kg)", sets:"60 sec"}, {name:"Front Raises", sets:"60 sec"},
{name:"Lateral (top half)", sets:"60 sec"}, {name:"Arm Circles", sets:"45 sec"},
{name:"Hanging Leg Raise", sets:"3x12"}, {name:"Vacuum", sets:"3x30 sec"}
]},
{ day:"Tuesday", exercises:[
{name:"Bulgarian Split Squat", sets:"3x8"}, {name:"Leg Press (feet neutral)", sets:"3x10"},
{name:"Walking Lunges", sets:"2x20 steps"}, {name:"Leg Curl", sets:"3x12"},
{name:"Standing Calf Raise", sets:"4x12"}, {name:"Seated Calf Raise", sets:"3x15"},
{name:"Dead Bug", sets:"3x12"}, {name:"Reverse Crunch", sets:"3x15"}
]},
{ day:"Wednesday", exercises:[
{name:"Hip Flexor Stretch", sets:"2 min each"}, {name:"Hamstrings Stretch", sets:"2 min"},
{name:"Pigeon Stretch", sets:"2 min"}, {name:"Hollow Hold", sets:"3x30 sec"},
{name:"Plank (posterior tilt)", sets:"3x30 sec"}, {name:"Vacuum", sets:"5 min"},
{name:"Lateral Raises (2–3kg)", sets:"60 sec"}, {name:"Front Raises", sets:"60 sec"},
{name:"Lateral (top half)", sets:"60 sec"}, {name:"Arm Circles", sets:"45 sec"},
{name:"Incline Walk", sets:"15–20 min"}
]},
{ day:"Thursday", exercises:[
{name:"Wide Pulldown - 60kg", sets:"3x10"}, {name:"Single-arm Cable Row - 40kg", sets:"3x12"},
{name:"Cable Reverse Fly - 7.5kg", sets:"3x15"}, {name:"Incline Push-ups", sets:"2x20"},
{name:"Lateral Raises (2–3kg)", sets:"60 sec"}, {name:"Front Raises", sets:"60 sec"},
{name:"Lateral (top half)", sets:"60 sec"}, {name:"Arm Circles", sets:"45 sec"},
{name:"Abs Circuit", sets:""}
]},
{ day:"Friday", exercises:[
{name:"Bodyweight Squat", sets:"4x20"}, {name:"Push-ups", sets:"4x15"},
{name:"Hanging Knee Raises", sets:"4x12"}, {name:"High Knees", sets:"4x80"},
{name:"Lateral Raises (2–3kg)", sets:"60 sec"}, {name:"Front Raises", sets:"60 sec"},
{name:"Lateral (top half)", sets:"60 sec"}, {name:"Arm Circles", sets:"45 sec"},
{name:"Lateral Raises (light)", sets:"60 sec"}, {name:"Biceps Curls (light)", sets:"60 sec"}
]},
{ day:"Saturday", exercises:[
{name:"Light Shoulders Circuit", sets:""}, {name:"Light Arms Circuit", sets:""},
{name:"Abs", sets:""}, {name:"20 min Walk", sets:""}
]},
{ day:"Sunday", exercises:[] }
];

// --- real dates for the current week ---
const calendar = document.getElementById("calendar");
const workoutContainer = document.getElementById("workout-container");
let savedProgress = JSON.parse(localStorage.getItem("calendarProgress")) || {};
let activeDateKey = "";

function getWeekDates(){
const now = new Date();
const day = now.getDay(); // Sunday=0
const monday = new Date(now);
monday.setDate(now.getDate() - (day==0?6:day-1)); // move to Monday
let dates = [];
for(let i=0;i<7;i++){
const d = new Date(monday);
d.setDate(monday.getDate()+i);
dates.push(d);
}
return dates;
}

const weekDates = getWeekDates();

weekDates.forEach((date,i)=>{
const dayDiv = document.createElement("div");
dayDiv.className="day";
const dd = date.getDate();
const mm = date.getMonth()+1;
dayDiv.innerText=`${plan[i].day}\n${dd}/${mm}`;
if(new Date().toDateString() === date.toDateString()) dayDiv.classList.add("today");
dayDiv.addEventListener("click",()=>{
activeDateKey = `${date.toDateString()}`;
selectDay(i);
});
calendar.appendChild(dayDiv);
});

function selectDay(index){
document.querySelectorAll(".day").forEach((d,i)=>d.classList.toggle("active", i===index));
renderExercises(index);
}

function renderExercises(index){
workoutContainer.innerHTML="";
const exercises=plan[index].exercises;
exercises.forEach((ex,i)=>{
const div = document.createElement("div");
div.className="exercise";
const id=`${activeDateKey}-ex${i}`;
const checked = savedProgress[id] ? "checked" : "";
if(checked) div.classList.add("completed");
div.innerHTML=`<input type="checkbox" class="checkbox" id="${id}" ${checked}> <strong>${ex.name}</strong> ${ex.sets}`;
workoutContainer.appendChild(div);
const checkbox=document.getElementById(id);
checkbox.addEventListener("change",()=>{
savedProgress[id]=checkbox.checked;
localStorage.setItem("calendarProgress",JSON.stringify(savedProgress));
div.classList.toggle("completed", checkbox.checked);
});
});
}

// select today initially
const todayIndex = weekDates.findIndex(d=>new Date().toDateString()===d.toDateString());
activeDateKey = weekDates[todayIndex].toDateString();
selectDay(todayIndex);
</script>

</body>
</html>
