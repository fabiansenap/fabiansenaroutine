<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabian Sena Workout</title>

<style>
body {
font-family: Arial, sans-serif;
background: #0f0f0f;
color: white;
padding: 20px;
}
h1 {
text-align: center;
color: gold;
}

#tabs {
display: flex;
justify-content: center;
gap: 10px;
margin-bottom: 15px;
}
.tab {
padding: 10px 15px;
background: #222;
border-radius: 8px;
cursor: pointer;
}
.tab.active {
background: gold;
color: black;
}

#calendar {
display: flex;
gap: 5px;
margin-bottom: 20px;
}
.day {
background: #222;
padding: 8px;
border-radius: 8px;
cursor: pointer;
flex: 1;
text-align: center;
}
.day.active {
background: gold;
color: black;
}

.exercise {
background: #222;
padding: 10px;
margin-bottom: 10px;
border-radius: 8px;
}
textarea {
width: 100%;
margin-top: 5px;
background: #111;
color: white;
border: 1px solid #333;
border-radius: 6px;
}
</style>

</head>
<body>

<h1>Fabian Sena Workout</h1>

<div id="tabs">
<div class="tab active" onclick="showTab('workout')">Workout</div>
<div class="tab" onclick="showTab('nutrition')">Nutrition</div>
</div>

<div id="calendar"></div>
<div id="workout"></div>

<div id="nutrition" style="display:none;">
<textarea id="nutritionNotes" placeholder="Write your nutrition plan..."></textarea>
</div>

<script>

// -------- PLAN --------
const plan = [
{
day:"Mon",
exercises:[
"Incline DB Press – 3x8","Neutral Pull-ups – 3x8","Cable Fly – 3x12","Face Pull – 3x15","Lateral Raise – 3x12","Cable Punch – 3x12",
"Lateral Raises – 60 sec","Front Raises – 60 sec","Lateral top half – 60 sec","Arm Circles – 45 sec",
"Hanging Leg Raise – 3x12","Vacuum – 3x30 sec"
]},
{
day:"Tue",
exercises:[
"Bulgarian Split Squat – 3x8","Leg Press – 3x10","Walking Lunges – 2x20","Leg Curl – 3x12",
"Standing Calf Raise – 4x12","Seated Calf Raise – 3x15","Dead Bug – 3x12","Reverse Crunch – 3x15"
]},
{
day:"Wed",
exercises:[
"Hip Flexor Stretch – 2 min","Hamstrings Stretch – 2 min","Pigeon Stretch – 2 min",
"Hollow Hold – 3x30 sec","Plank – 3x30 sec","Vacuum – 5 min",
"Lateral Raises – 60 sec","Front Raises – 60 sec","Lateral top half – 60 sec","Arm Circles – 45 sec",
"Incline Walk – 20 min"
]},
{
day:"Thu",
exercises:[
"Wide Pulldown – 3x10","Single Arm Row – 3x12","Reverse Fly – 3x15","Incline Push-ups – 2x20",
"Lateral Raises – 60 sec","Front Raises – 60 sec","Lateral top half – 60 sec","Arm Circles – 45 sec","Abs Circuit"
]},
{
day:"Fri",
exercises:[
"Bodyweight Squat – 20","Push-ups – 15","Hanging Knee Raises – 12","High Knees – 80",
"Lateral Raises – 60 sec","Front Raises – 60 sec","Lateral top half – 60 sec","Arm Circles – 45 sec",
"Lateral Raises Light – 60 sec","Biceps Curls Light – 60 sec"
]},
{
day:"Sat",
exercises:["Light Shoulders","Light Arms","Abs","20 min Walk"]
},
{day:"Sun",exercises:[]}
];

let currentDay = 0;
let data = JSON.parse(localStorage.getItem("trackerData")) || {};

// -------- TABS --------
function showTab(tab){
document.getElementById("workout").style.display = tab==="workout" ? "block":"none";
document.getElementById("nutrition").style.display = tab==="nutrition" ? "block":"none";
}

// -------- CALENDAR --------
const calendar = document.getElementById("calendar");

plan.forEach((d,i)=>{
const div = document.createElement("div");
div.className = "day";
div.innerText = d.day;
div.onclick = () => selectDay(i);
calendar.appendChild(div);
});

// -------- SELECT DAY --------
function selectDay(index){
currentDay = index;

document.querySelectorAll(".day").forEach((d,i)=>{
d.classList.toggle("active", i===index);
});

const container = document.getElementById("workout");
container.innerHTML = "";

plan[index].exercises.forEach((ex,i)=>{
const key = `${index}-${i}`;
const saved = data[key] || {};

const div = document.createElement("div");
div.className = "exercise";

div.innerHTML = `
<label>
<input type="checkbox" ${saved.checked ? "checked":""}> ${ex}
</label>
<textarea placeholder="Notes...">${saved.note || ""}</textarea>
`;

const checkbox = div.querySelector("input");
const textarea = div.querySelector("textarea");

checkbox.onchange = () => {
data[key] = data[key] || {};
data[key].checked = checkbox.checked;
save();
};

textarea.oninput = () => {
data[key] = data[key] || {};
data[key].note = textarea.value;
save();
};

container.appendChild(div);
});
}

// -------- SAVE --------
function save(){
localStorage.setItem("trackerData", JSON.stringify(data));
}

// -------- INIT --------
selectDay(0);

</script>

</body>
</html>
